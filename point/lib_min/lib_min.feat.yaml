description: >
  Minimal feature for the lib_executor spike (point/EXECUTORS.md, seed dizzy-cc49):
  one procedure and one policy, plus the commands and events they require. The
  reactivity loop is add_book -> catalog_book -> book_added -> index_on_catalog ->
  index_book, exercising both halves of the mirror rule with real generated code.

commands:
  add_book: A librarian adds a book to the catalog
  index_book: Add a freshly-cataloged book to the search index

events:
  book_added: A book was added to the catalog

procedures:
  catalog_book:
    description: |
      Record that a book was added to the catalog. Stamp a catalog id and carry
      the title and copy count onto the book_added fact.
    command: add_book
    emits: [book_added]

policies:
  index_on_catalog:
    description: |
      When a book is cataloged, queue it for search indexing by dispatching
      index_book for the same catalog id and title. A policy dispatches commands;
      it never emits events (the mirror of a procedure).
    event: book_added
    emits: [index_book]
