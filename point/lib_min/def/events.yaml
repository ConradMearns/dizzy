id: https://example.org/events
name: events
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  book_added:
    description: A book was added to the catalog
    attributes:
      catalog_id:
        range: string
        required: true
      title:
        range: string
        required: true
      copies:
        range: integer
        required: true
