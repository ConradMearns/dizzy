id: https://example.org/commands
name: commands
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  add_book:
    description: A librarian adds a book to the catalog
    attributes:
      title:
        range: string
        required: true
      copies:
        range: integer
        required: true
  index_book:
    description: Add a freshly-cataloged book to the search index
    attributes:
      catalog_id:
        range: string
        required: true
      title:
        range: string
        required: true
