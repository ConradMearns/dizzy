<style>
  :root {

  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--txt);
    font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  header {
    padding: 14px 18px; border-bottom: 1px solid var(--line);
    display: flex; gap: 18px; align-items: baseline; flex-wrap: wrap;
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  header .sub { color: var(--dim); }
  .tabs { display: flex; gap: 6px; margin-left: auto; }
  .tabs button {
    background: var(--panel); color: var(--txt); border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 12px; cursor: pointer; font: inherit;
  }
  .tabs button.active { border-color: var(--accent); color: var(--accent); }
  .toolbar { padding: 8px 18px; display: flex; gap: 10px; align-items: center; color: var(--dim); }
  .toolbar button {
    background: transparent; color: var(--dim); border: 1px solid var(--line);
    border-radius: 5px; padding: 3px 9px; cursor: pointer; font: inherit;
  }
  .toolbar button:hover { color: var(--txt); border-color: var(--accent); }
  main { padding: 4px 18px 60px; }
  .session { display: none; }
  .session.active { display: block; }

  /* tree */
  ul.tree { list-style: none; margin: 0; padding-left: 0; }
  ul.tree ul { list-style: none; margin: 0; padding-left: 20px; border-left: 1px solid var(--line); margin-left: 7px; }
  li.node { margin: 1px 0; }
  .row {
    display: flex; gap: 8px; align-items: baseline; padding: 2px 6px;
    border-radius: 5px; cursor: default;
  }
  .row:hover { background: #1c2230; }
  .twist {
    width: 12px; display: inline-block; text-align: center; cursor: pointer;
    color: var(--dim); user-select: none; flex: none;
  }
  .twist.leaf { visibility: hidden; }
  .id { color: var(--dim); flex: none; min-width: 34px; }
  .badge {
    flex: none; padding: 0 7px; border-radius: 10px; font-size: 11px;
    font-weight: 600; color: #0f1115; white-space: nowrap;
  }
  .step { flex: none; color: var(--accent); min-width: 30px; }
  .label { color: var(--txt); }
  .label .muted { color: var(--dim); }
  .label .comp { color: #e7c97a; }
  li.collapsed > ul { display: none; }
  li.collapsed > .row .twist::after { content: "▸"; }
  li:not(.collapsed) > .row .twist::after { content: "▾"; }
  .twist.leaf::after { content: ""; }

  /* type colors */
  .t-header   { background: #9aa6b8; }
  .t-context  { background: #b08cff; }
  .t-injection{ background: #6ea8fe; }
  .t-activation{ background: #4cd0a0; }
  .t-activation_end{ background: #2f8f6f; color:#dfffe9; }
  .t-tool_call{ background: #7fd1ff; }
  .t-emission { background: #5bd6c0; }
  .t-query_answer{ background: #8fd66b; }
  .t-finding  { background: #ff9d5c; }
  .t-ruling   { background: #f5c542; }
  .t-resolution{ background: #ffd97a; }
  .t-branch   { background: #ff7ab2; }
  .t-amendment{ background: #c08cff; }
  .t-halt     { background: #ff6b6b; color:#fff; }
  .t-default  { background: #6b7686; color:#fff; }

  .legend { display:flex; flex-wrap:wrap; gap:6px; padding: 4px 18px 10px; }
  .legend .badge { font-size:10px; }
</style>

<script>
const RAW = JSON.parse(document.getElementById('data').textContent);

const TYPES = ["header","context","injection","activation","activation_end",
  "tool_call","emission","query_answer","finding","ruling","resolution",
  "branch","amendment","halt"];

function typeClass(t){ return TYPES.includes(t) ? "t-"+t : "t-default"; }

// One-line human summary per entry, type-aware.
function summarize(e){
  const c = e.component ? `<span class="comp">${esc(e.component)}</span>` : "";
  switch(e.type){
    case "header": return `<span class="muted">${esc(e.feat||"")} · ${esc(e.scenario||"level "+e.level)} · budget ${e.step_budget}</span>`;
    case "context": return `<span class="muted">${esc((e.givens||[]).join(" · "))}</span>`;
    case "injection": return `<b>${esc(e.message)}</b> <span class="muted">[${esc(e.queue)}] ${esc(e.narrative||"")}</span>`;
    case "activation": return `${c} <span class="muted">(${esc(e.kind||"")})</span> ${e.status?`<span class="muted">${esc(e.status)}</span>`:""}`;
    case "activation_end": return `${c} <span class="muted">→ ${esc((e.emissions||[]).join(", ")||"no emit")} · ${esc(e.outcome||"")}</span>`;
    case "tool_call": return `${c} <span class="muted">·</span> <b>${esc(e.tool)}</b> <span class="muted">${esc(verdictShort(e))}</span>`;
    case "emission": return `<b>${esc(e.event||e.command)}</b> <span class="muted">[${esc(e.queued||"")}] ${esc(e.narrative||"")}</span>`;
    case "query_answer": return `<b>${esc(e.query)}</b> <span class="muted">— ${esc(e.answer||"")}</span>`;
    case "finding": return `<b>${esc(e.category||e.kind||"finding")}</b> <span class="muted">${esc(e.summary||e.detail||"")}</span>`;
    case "ruling": return `<span class="muted">${esc(e.rule?("rule "+e.rule):(e.question||""))} — ${esc(e.decision||"")}</span>`;
    case "resolution": return `<span class="muted">resolves ${esc(e.resolves||"")} — ${esc(e.decision||"")}</span>`;
    case "branch": return `<span class="muted">${esc(e.reason||"")}</span>`;
    case "amendment": return `<span class="muted">${esc(e.target||"")} — ${esc(e.detail||"")}</span>`;
    case "halt": return `<b>${esc(e.reason||"halt")}</b> <span class="muted">${esc(e.detail||("steps "+(e.steps_used||e.step||"")))}</span>`;
    default: return `<span class="muted">${esc(JSON.stringify(stripCommon(e)))}</span>`;
  }
}
function verdictShort(e){ const v=e.verdict||""; return v.length>60?v.slice(0,57)+"…":v; }
function stripCommon(e){ const {id,parentId,type,...rest}=e; return rest; }
function esc(s){ return String(s==null?"":s).replace(/[&<>]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[m])); }

function buildTree(entries){
  const byId = new Map(); const roots = [];
  entries.forEach(e=>byId.set(e.id, {e, kids:[]}));
  entries.forEach(e=>{
    const n = byId.get(e.id);
    if(e.parentId && byId.has(e.parentId)) byId.get(e.parentId).kids.push(n);
    else roots.push(n);
  });
  return roots;
}

function renderNode(n){
  const e = n.e;
  const li = document.createElement("li");
  li.className = "node" + (n.kids.length?"":"");
  const row = document.createElement("div");
  row.className = "row";
  const tw = document.createElement("span");
  tw.className = "twist" + (n.kids.length?"":" leaf");
  tw.onclick = ()=> li.classList.toggle("collapsed");
  const step = e.step!=null ? `<span class="step">s${esc(e.step)}</span>` : `<span class="step"></span>`;
  row.innerHTML =
    `<span class="id">${esc(e.id)}</span>` +
    `<span class="badge ${typeClass(e.type)}">${esc(e.type)}</span>` +
    step +
    `<span class="label">${summarize(e)}</span>`;
  row.insertBefore(tw, row.firstChild);
  li.appendChild(row);
  if(n.kids.length){
    const ul = document.createElement("ul");
    n.kids.forEach(k=>ul.appendChild(renderNode(k)));
    li.appendChild(ul);
  }
  return li;
}

let active = 0;
function render(){
  const main = document.getElementById("main");
  main.innerHTML = "";
  RAW.forEach((sess, i)=>{
    const div = document.createElement("div");
    div.className = "session" + (i===active?" active":"");
    const ul = document.createElement("ul");
    ul.className = "tree";
    buildTree(sess.entries).forEach(r=>ul.appendChild(renderNode(r)));
    div.appendChild(ul);
    main.appendChild(div);
  });
  const s = RAW[active];
  document.getElementById("meta").textContent =
    `${s.entries.length} entries`;
}

function expandAll(open){
  document.querySelectorAll(".session.active li.node").forEach(li=>{
    if(open) li.classList.remove("collapsed"); else li.classList.add("collapsed");
  });
}

// tabs
const tabs = document.getElementById("tabs");
RAW.forEach((s,i)=>{
  const b = document.createElement("button");
  b.textContent = s.name;
  b.className = i===active?"active":"";
  b.onclick = ()=>{
    active=i;
    document.querySelectorAll(".tabs button").forEach((x,j)=>x.classList.toggle("active",j===i));
    document.querySelectorAll(".session").forEach((x,j)=>x.classList.toggle("active",j===i));
    render();
  };
  tabs.appendChild(b);
});

// legend
const legend = document.getElementById("legend");
TYPES.forEach(t=>{
  const s=document.createElement("span");
  s.className="badge "+typeClass(t); s.textContent=t;
  legend.appendChild(s);
});

render();
</script>
</body>
</html>
