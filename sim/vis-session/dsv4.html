<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIZZY Sim Session Viewer</title>
<style>
  :root {
    --bg: #0d1117;
    --fg: #c9d1d9;
    --border: #30363d;
    --accent: #58a6ff;
    --subtle: #8b949e;
    --card-bg: #161b22;
    --hover-bg: #1c2129;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 24px;
  }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    padding: 12px 0 16px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .toolbar select, .toolbar button {
    background: var(--card-bg);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font: inherit; font-size: 12px;
    cursor: pointer;
  }
  .toolbar button:hover { background: var(--hover-bg); }
  .toolbar label { color: var(--subtle); font-size: 12px; }
  .toolbar .count { color: var(--subtle); font-size: 12px; margin-left: auto; }

  .tree { padding-left: 0; }

  .node { position: relative; }

  .node-row {
    display: flex; align-items: flex-start;
    padding: 3px 0;
    cursor: pointer;
    border-radius: 4px;
  }
  .node-row:hover { background: var(--hover-bg); }

  .toggle {
    width: 20px; min-width: 20px;
    text-align: center;
    color: var(--subtle);
    user-select: none;
    font-size: 11px;
    line-height: 20px;
  }
  .toggle.has-children { cursor: pointer; }
  .toggle.has-children:hover { color: var(--fg); }
  .toggle.leaf { visibility: hidden; }

  .type-badge {
    min-width: 86px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 6px;
    border-radius: 3px;
    text-align: center;
    margin-right: 10px;
    line-height: 18px;
    flex-shrink: 0;
  }

  .label { flex: 1; min-width: 0; }
  .label .main { word-break: break-word; }
  .label .meta {
    font-size: 11px;
    color: var(--subtle);
    margin-top: 1px;
  }

  .children { border-left: 1px solid var(--border); margin-left: 10px; }
  .children .node-row { padding-left: 10px; }
  .collapsed > .children { display: none; }
  .collapsed > .node-row .toggle.has-children::before { content: '▶'; }
  .expanded > .node-row .toggle.has-children::before { content: '▼'; }

  /* Type colors */
  .type-header        { background: #30363d; color: #8b949e; }
  .type-ruling        { background: #1a1a2e; color: #7b7bff; }
  .type-injection     { background: #162b16; color: #3fb950; }
  .type-activation    { background: #1a1a3e; color: #79c0ff; }
  .type-tool_call     { background: #2e1a2e; color: #d2a8ff; }
  .type-emission      { background: #1e2e1e; color: #7ee787; }
  .type-activation_end{ background: #1a1a3e; color: #79c0ff; }
  .type-finding       { background: #2e1a1a; color: #f85149; }
  .type-halt          { background: #2e2e1a; color: #d2991d; }
  .type-resolution    { background: #2e1a2e; color: #f778ba; }
  .type-branch        { background: #1a2e2e; color: #56d4dd; }
  .type-context       { background: #162b16; color: #3fb950; }
  .type-query_answer  { background: #2e1e1e; color: #f0883e; }
  .type-amendment     { background: #2e1a2e; color: #f778ba; }

  .type-activation_end .type-badge { color: #79c0ff; }

  /* Popup detail */
  .detail-popup {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    justify-content: center; align-items: center;
  }
  .detail-popup.open { display: flex; }
  .detail-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    max-width: 720px;
    max-height: 80vh;
    overflow-y: auto;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .detail-card h3 { font-size: 14px; margin-bottom: 12px; color: var(--accent); }
  .detail-card table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .detail-card td {
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .detail-card td:first-child {
    color: var(--subtle);
    white-space: nowrap;
    width: 120px;
  }
  .detail-card td:last-child { word-break: break-word; white-space: pre-wrap; }
  .detail-card .close-btn {
    float: right;
    background: none; border: 1px solid var(--border);
    color: var(--fg);
    border-radius: 4px;
    padding: 4px 10px;
    cursor: pointer;
    font: inherit; font-size: 12px;
  }
  .detail-card .close-btn:hover { background: var(--hover-bg); }

  .highlight {
    background: rgba(88, 166, 255, 0.1);
    outline: 1px solid var(--accent);
    border-radius: 3px;
  }
</style>
</head>
<body>
<div class="toolbar">
  <label for="file-select">Session:</label>
  <select id="file-select">
    <option value="borrow_available_book__1.jsonl">borrow_available_book__1</option>
    <option value="contested_reservation__3.jsonl">contested_reservation__3</option>
  </select>
  <button id="expand-all">Expand All</button>
  <button id="collapse-all">Collapse All</button>
  <button id="collapse-to-findings">Only Findings</button>
  <span class="count" id="node-count"></span>
</div>

<div class="tree" id="tree"></div>

<div class="detail-popup" id="popup">
  <div class="detail-card" id="popup-content"></div>
</div>

<script>
// ---- Utils ----
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmt(v) {
  if (v === null || v === undefined) return '—';
  if (typeof v === 'object') return JSON.stringify(v, null, 2);
  return String(v);
}

// ---- Short label per type ----
function nodeLabel(node) {
  switch (node.type) {
    case 'header':
      return `<span class="main"><b>${esc(node.feat || '')}</b></span>
              <span class="meta">scenario: ${esc(node.scenario || '')} · level ${node.level} · budget ${node.step_budget}</span>`;
    case 'ruling':
      return `<span class="main"><b>${esc(node.by || '?')}</b>: ${esc(node.question || '')}</span>
              ${node.decision ? `<span class="meta">→ ${esc(node.decision)}</span>` : ''}`;
    case 'injection':
      return `<span class="main"><b>inject</b> ${esc(node.message || '')}</span>
              <span class="meta">queue: ${esc(node.queue)} · ${esc(node.narrative || '')}</span>`;
    case 'activation':
      return `<span class="main"><b>${esc(node.component || '?')}</b> (${esc(node.kind || '?')})</span>
              <span class="meta">step ${esc(node.step)} · trigger: ${esc((node.trigger || '').slice(0,80))}${(node.trigger||'').length>80?'…':''}</span>`;
    case 'tool_call':
      return `<span class="main"><b>${esc(node.tool)}</b> — ${esc(node.component||'')}</span>
              ${node.args ? `<span class="meta">args: ${esc(JSON.stringify(node.args))}</span>` : ''}`;
    case 'emission':
      return `<span class="main"><b>emit</b> ${esc(node.event || node.command || '?')} → ${esc(node.queued||'?')}</span>
              <span class="meta">step ${esc(node.step)} · ${esc((node.narrative || '').slice(0,100))}${(node.narrative||'').length>100?'…':''}</span>`;
    case 'activation_end':
      return `<span class="main"><b>end</b> ${esc(node.component||'?')}</span>
              <span class="meta">step ${esc(node.step)} · emissions: [${(node.emissions||[]).join(', ')}] · ${esc(node.outcome || '')}</span>`;
    case 'finding':
      return `<span class="main"><b>FINDING · ${esc(node.category||'?')}</b></span>
              <span class="meta">step ${esc(node.step)} · ${esc(node.component||'')} · ${esc((node.summary || '').slice(0,120))}${(node.summary||'').length>120?'…':''}</span>`;
    case 'halt':
      return `<span class="main"><b>HALT</b> — ${esc(node.reason || '?')}</span>
              <span class="meta">steps: ${esc(node.steps_used)} · findings: ${(node.findings||[]).length} · events: ${(node.event_store||[]).length}</span>`;
    case 'resolution':
      return `<span class="main"><b>RESOLVES ${esc(node.resolves)}</b></span>
              <span class="meta">by: ${esc(node.by)} · ${esc(node.category||'')} · ${esc((node.decision||'').slice(0,120))}${(node.decision||'').length>120?'…':''}</span>`;
    case 'branch':
      return `<span class="main"><b>BRANCH</b></span>
              <span class="meta">${esc(node.reason || '')}</span>`;
    case 'context':
      return `<span class="main"><b>CONTEXT</b></span>
              <span class="meta">${(node.givens||[]).map(g => esc(g)).join(' · ')}</span>`;
    case 'query_answer':
      return `<span class="main"><b>answer:</b> ${esc(node.answer || '?')}</span>
              <span class="meta">query: ${esc(node.query)} · provenance: ${(node.provenance||[]).join(', ')}</span>`;
    case 'amendment':
      return `<span class="main"><b>AMENDMENT</b> → ${esc(node.target||'?')}</span>
              <span class="meta">applies: [${(node.applies||[]).join(', ')}] · ${esc((node.detail||'').slice(0,100))}${(node.detail||'').length>100?'…':''}</span>`;
    default:
      return `<span class="main">${esc(node.type)} · id=${esc(node.id)}</span>`;
  }
}

// ---- Tree building ----
function buildTree(lines) {
  const map = new Map();
  const roots = [];
  for (const node of lines) {
    map.set(node.id, { ...node, children: [] });
  }
  for (const node of map.values()) {
    if (node.parentId && map.has(node.parentId)) {
      map.get(node.parentId).children.push(node);
    } else if (!node.parentId) {
      roots.push(node);
    }
  }
  return { map, roots };
}

// ---- Rendering ----
const TYPE_TO_CLASS = {
  header: 'type-header',
  ruling: 'type-ruling',
  injection: 'type-injection',
  activation: 'type-activation',
  tool_call: 'type-tool_call',
  emission: 'type-emission',
  activation_end: 'type-activation_end',
  finding: 'type-finding',
  halt: 'type-halt',
  resolution: 'type-resolution',
  branch: 'type-branch',
  context: 'type-context',
  query_answer: 'type-query_answer',
  amendment: 'type-amendment',
};

function renderNode(node) {
  const hasKids = node.children.length > 0;
  const cls = 'expanded';
  const typeClass = TYPE_TO_CLASS[node.type] || '';

  const div = document.createElement('div');
  div.className = `node ${cls}`;
  div.dataset.id = node.id;

  const row = document.createElement('div');
  row.className = 'node-row';

  const toggle = document.createElement('span');
  toggle.className = hasKids ? 'toggle has-children' : 'toggle leaf';
  if (hasKids) toggle.textContent = ''; // CSS handles it
  row.appendChild(toggle);

  const badge = document.createElement('span');
  badge.className = `type-badge ${typeClass}`;
  badge.textContent = node.type.replace('_', ' ');
  row.appendChild(badge);

  const label = document.createElement('span');
  label.className = 'label';
  label.innerHTML = nodeLabel(node);
  row.appendChild(label);

  row.addEventListener('click', (e) => {
    // Toggle expand/collapse
    if (hasKids && e.target === toggle) {
      div.classList.toggle('expanded');
      div.classList.toggle('collapsed');
      return;
    }
    // Show detail popup
    showDetail(node);
  });

  div.appendChild(row);

  if (hasKids) {
    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'children';
    for (const child of node.children) {
      childrenDiv.appendChild(renderNode(child));
    }
    div.appendChild(childrenDiv);
  }

  return div;
}

// ---- Detail popup ----
function showDetail(node) {
  const content = document.getElementById('popup-content');
  let html = `<button class="close-btn" onclick="closeDetail()">✕ Close</button>`;
  html += `<h3>${esc(node.type.toUpperCase())} · ${esc(node.id)}</h3>`;
  html += '<table>';
  const skip = new Set(['id', 'parentId', 'type', 'children']);
  for (const [k, v] of Object.entries(node)) {
    if (skip.has(k)) continue;
    html += `<tr><td>${esc(k)}</td><td>${esc(fmt(v))}</td></tr>`;
  }
  html += '</table>';

  // Links to parent/children
  if (node.parentId) {
    html += `<p style="margin-top:12px;font-size:12px;color:var(--subtle)">parent: <a href="#" onclick="scrollToNode('${esc(node.parentId)}');return false" style="color:var(--accent)">${esc(node.parentId)}</a></p>`;
  }
  if (node.children.length > 0) {
    html += `<p style="font-size:12px;color:var(--subtle)">children: ${node.children.map(c => `<a href="#" onclick="scrollToNode('${esc(c.id)}');return false" style="color:var(--accent)">${esc(c.id)}</a>`).join(', ')}</p>`;
  }

  content.innerHTML = html;
  document.getElementById('popup').classList.add('open');
}

function closeDetail() {
  document.getElementById('popup').classList.remove('open');
}

document.getElementById('popup').addEventListener('click', function(e) {
  if (e.target === this) closeDetail();
});

function scrollToNode(id) {
  closeDetail();
  const el = document.querySelector(`[data-id="${CSS.escape(id)}"]`);
  if (el) {
    // Expand all ancestors
    let p = el.parentElement;
    while (p) {
      if (p.classList.contains('collapsed')) {
        p.classList.remove('collapsed');
        p.classList.add('expanded');
      }
      p = p.parentElement;
    }
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    el.querySelector('.node-row')?.classList.add('highlight');
    setTimeout(() => el.querySelector('.node-row')?.classList.remove('highlight'), 2000);
  }
}

// ---- File loading ----
async function loadFile(filename) {
  const resp = await fetch(`sessions/${filename}`);
  const text = await resp.text();
  const lines = text.trim().split('\n').map(l => JSON.parse(l));
  return lines;
}

let currentData = [];
let currentTree = null;

async function showFile(filename) {
  currentData = await loadFile(filename);
  currentTree = buildTree(currentData);
  document.getElementById('node-count').textContent = `${currentData.length} nodes`;
  renderAll();
}

function renderAll() {
  const container = document.getElementById('tree');
  container.innerHTML = '';
  if (!currentTree) return;
  for (const root of currentTree.roots) {
    container.appendChild(renderNode(root));
  }
}

// ---- Toolbar actions ----
function expandAll() {
  document.querySelectorAll('.node.collapsed').forEach(n => {
    n.classList.remove('collapsed');
    n.classList.add('expanded');
  });
}

function collapseAll() {
  document.querySelectorAll('.node.expanded').forEach(n => {
    n.classList.remove('expanded');
    n.classList.add('collapsed');
  });
}

function collapseToFindings() {
  // Collapse everything, then expand only paths that contain findings
  collapseAll();
  // Expand ancestors of each finding
  document.querySelectorAll('.type-finding').forEach(badge => {
    let el = badge.closest('.node');
    while (el) {
      el.classList.remove('collapsed');
      el.classList.add('expanded');
      // Go up to parent node
      const parentDiv = el.parentElement?.closest('.node');
      el = parentDiv || null;
    }
  });
  // Scroll to first finding
  const first = document.querySelector('.type-finding');
  if (first) first.closest('.node-row')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

document.getElementById('file-select').addEventListener('change', e => showFile(e.target.value));
document.getElementById('expand-all').addEventListener('click', expandAll);
document.getElementById('collapse-all').addEventListener('click', collapseAll);
document.getElementById('collapse-to-findings').addEventListener('click', collapseToFindings);

// ---- Init ----
showFile('borrow_available_book__1.jsonl');
</script>
</body>
</html>
