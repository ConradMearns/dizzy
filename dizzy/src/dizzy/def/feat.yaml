id: https://example.org/dizzy/feat
name: dizzy-feat-schema
title: Dizzy Feature Definition Meta-Schema
description: >-
  LinkML meta-schema formally defining the structure of .feat.yaml feature definition files
  used by the Dizzy generator pipeline.

prefixes:
  linkml: https://w3id.org/linkml/
  dizzy: https://example.org/dizzy/

default_prefix: dizzy
default_range: string

imports:
  - linkml:types

classes:
  FeatureDefinition:
    description: >-
      Top-level container for a Dizzy feature definition file.
    attributes:
      description:
        description: Human-readable description of the feature
        range: string
      models:
        description: Named database schemas
        range: ModelDef
        multivalued: true
        inlined: true
      queries:
        description: Named read operations
        range: QueryDef
        multivalued: true
        inlined: true
      commands:
        description: Named write intents
        range: CommandDef
        multivalued: true
        inlined: true
      events:
        description: Immutable domain facts
        range: EventDef
        multivalued: true
        inlined: true
      procedures:
        description: Command handlers
        range: ProcedureDef
        multivalued: true
        inlined: true
      policies:
        description: Event-driven reaction handlers
        range: PolicyDef
        multivalued: true
        inlined: true
      projections:
        description: Read-model builders
        range: ProjectionDef
        multivalued: true
        inlined: true
      environment:
        description: >-
          Named injected constants/variables, acquired in place of os env vars.
          Each names a shape authored in def/environment.yaml.
        range: EnvironmentDef
        multivalued: true
        inlined: true
      telemetry:
        description: >-
          Named host-injected observation sinks (callables). Each names the
          payload shape authored in def/telemetry.yaml.
        range: TelemetryDef
        multivalued: true
        inlined: true

  EnvironmentDef:
    description: >-
      A named injected constant/variable available to functions in place of an
      os environment variable. Its shape is authored in def/environment.yaml.
    attributes:
      name:
        description: Environment entry name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the environment entry
        range: string

  TelemetryDef:
    description: >-
      A named host-injected observation sink. The function calls it with a typed
      payload whose shape is authored in def/telemetry.yaml.
    attributes:
      name:
        description: Telemetry sink name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the telemetry sink
        range: string

  ModelDef:
    description: >-
      A named database schema declaration.
    attributes:
      name:
        description: Schema name (plural, lowercase, snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the schema
        range: string
      adapters:
        description: Named adapter bindings for this model
        range: string
        multivalued: true

  QueryDef:
    description: >-
      A named read operation.
    attributes:
      name:
        description: Query name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the query
        range: string
        required: true
      model:
        description: The schema name from models that this query reads from
        range: string
      adapter:
        description: The adapter name on the model that this query uses
        range: string
      environment:
        description: Environment entry names this querier needs injected
        range: string
        multivalued: true
      telemetry:
        description: Telemetry sink names this querier may call
        range: string
        multivalued: true

  CommandDef:
    description: >-
      A named write intent.
    attributes:
      name:
        description: Command name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the command
        range: string

  EventDef:
    description: >-
      An immutable domain fact.
    attributes:
      name:
        description: Event name (snake_case, past-tense)
        range: string
        required: true
      description:
        description: Human-readable description of the event
        range: string

  ProcedureDef:
    description: >-
      A command handler that processes exactly one command, may use queries, and emits events.
    attributes:
      name:
        description: Procedure name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the procedure logic
        range: string
      command:
        description: The command name this procedure handles
        range: string
        required: true
      queries:
        description: Query names this procedure needs access to
        range: string
        multivalued: true
      emits:
        description: Event names this procedure may emit
        range: string
        multivalued: true
      environment:
        description: Environment entry names this procedure needs injected
        range: string
        multivalued: true
      telemetry:
        description: Telemetry sink names this procedure may call
        range: string
        multivalued: true

  PolicyDef:
    description: >-
      An event-driven reaction handler that listens to exactly one event, may use queries
      and optionally dispatches commands.
    attributes:
      name:
        description: Policy name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of the policy logic
        range: string
      event:
        description: The event name that triggers this policy
        range: string
        required: true
      queries:
        description: Query names this policy needs access to
        range: string
        multivalued: true
      emits:
        description: Command names this policy may dispatch
        range: string
        multivalued: true
      environment:
        description: Environment entry names this policy needs injected
        range: string
        multivalued: true
      telemetry:
        description: Telemetry sink names this policy may call
        range: string
        multivalued: true

  ProjectionDef:
    description: >-
      A read-model builder that responds to a single event and writes into one model schema
      via a named adapter.
    attributes:
      name:
        description: Projection name (snake_case)
        range: string
        required: true
      description:
        description: Human-readable description of what this projection does
        range: string
        required: true
      event:
        description: The single event that triggers this projection
        range: string
        required: true
      model:
        description: The schema name from models that this projection writes into
        range: string
      adapter:
        description: The adapter name on the model that this projection uses
        range: string
      environment:
        description: Environment entry names this projection needs injected
        range: string
        multivalued: true
      telemetry:
        description: Telemetry sink names this projection may call
        range: string
        multivalued: true
