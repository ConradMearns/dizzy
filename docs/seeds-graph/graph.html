const SEEDS = [{"id": "dizzy-fab8", "title": "Whole-loop narrated walkthrough: feature-file -> simulate -> generate -> run -> UI -> one change", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-18T00:12:36.974Z", "updatedAt": "2026-06-18T00:13:02.801Z", "description": "v1 success metric: a stranger threads the entire loop on the chosen example in an evening. A single narrated walkthrough (not reference docs): feature-file -> simulate -> generate -> run -> UI -> one change flowing through (impact-by-hand is fine if impact isn't ready). Broader than dizzy-7e6d, the simulate-only walkthrough.", "labels": ["roadmap"], "blockedBy": ["dizzy-29aa", "dizzy-1b5f", "dizzy-ae76", "dizzy-d04b"]}, {"id": "dizzy-1b5f", "title": "FastAPI example UI: the seam proving UIs are ordinary code talking to a Dizzy library", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-18T00:12:36.915Z", "updatedAt": "2026-06-18T00:13:02.660Z", "description": "v1. Deliberately boring FastAPI app that calls commands and queries against the generated library. Its only job: show Dizzy is the engine and the UI is ordinary code talking to it. Small, not impressive. Proves UIs are NOT built with Dizzy.", "labels": ["roadmap"], "blockedBy": ["dizzy-29aa"], "blocks": ["dizzy-fab8"]}, {"id": "dizzy-29aa", "title": "Single-threaded phased-queue runtime: generated libraries run on the defined sequential semantics", "status": "open", "type": "feature", "priority": 1, "createdAt": "2026-06-18T00:12:36.860Z", "updatedAt": "2026-06-18T00:13:02.884Z", "description": "v1 spine. Generated libraries ship a single-threaded runtime: a phased queue loop (drain the event queue, then drain the command queue, repeat) — Dizzy's *defined* semantics: one legal interleaving, sequentially consistent. The chosen example must actually RUN on this, not just generate. Everything downstream (simulate scheduler, future distributed runtime, TLA+) stays consistent with these semantics. Distinct from the simulate scheduler (dizzy-3c9e), which models the feat abstractly with scripted executors; this is the real engine the generated handlers + event store execute under.", "labels": ["roadmap"], "blocks": ["dizzy-1b5f", "dizzy-d04b", "dizzy-fab8", "dizzy-5052"]}, {"id": "dizzy-0db0", "title": "sim.py: finding resolution classification and deterministic branch point", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-17T23:07:51.674Z", "updatedAt": "2026-06-17T23:08:14.388Z", "description": "Extend resolve() with a required category field that classifies what must change after a finding is resolved. Three categories, each with a deterministic branch point: description-change (component prose description is wrong — branch from the node before the activation started, i.e. the entry immediately before the policy_started/procedure_started that produced the finding); wiring-change (declared queries/emits/commands are wrong — same branch point as description-change); scenario-change (scenario context or commands are under-specified — branch from the injection entry where the triggering command entered the queue). resolve() should return the correct branch_from_id for the caller to use when calling branch(). The branch() call should carry resolution_id in its meta so the session log is traceable. Depends on dizzy-4993 (activation_end, which shapes what nodes exist to branch from).", "blockedBy": ["dizzy-4993"]}, {"id": "dizzy-4993", "title": "sim.py: first-output review gate + activation_end entry type", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-17T23:07:36.722Z", "updatedAt": "2026-06-17T23:08:14.388Z", "description": "Add activation_end as a session log entry type that closes an activation. Fields: activation_id (the policy_started/procedure_started entry it closes), outcome (clean | finding | null), and a summary of emissions produced. For a component's first execution, after the executor runs and tool calls are logged, return gate_first_output from step() instead of immediately committing activation_end. The StepResult carries the activation id and the full tool_calls list so the caller can display them for Director review. The caller approves (step() commits activation_end with outcome=clean) or reports a finding (step() logs the finding entry, commits activation_end with outcome=finding, and returns so the caller can classify the finding). For all subsequent executions, activation_end is committed automatically after tool calls are logged. Depends on dizzy-ea81 (gate-aware step protocol).", "blockedBy": ["dizzy-ea81"], "blocks": ["dizzy-0db0"]}, {"id": "dizzy-c015", "title": "sim.py: pre-first-execution description review gate", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-17T23:07:23.838Z", "updatedAt": "2026-06-17T23:08:14.262Z", "description": "Before activating a component (policy or procedure) that has zero executions recorded in the current session, return gate_pre_activation from step() instead of running the executor. Execution count is derived from the session log: count policy_started/procedure_started entries whose log.procedure matches the component name. The StepResult carries the component name and its description (verbatim from the feat file) so the caller can display it for Director review. The caller then either confirms (calls step() again with the gate cleared) or amends (updates the feat file and calls step() again). If the description is amended, the caller is responsible for logging a branch. Depends on dizzy-ea81 (gate-aware step protocol).", "blockedBy": ["dizzy-ea81"]}, {"id": "dizzy-ea81", "title": "sim.py: gate-aware step protocol — StepResult signals clean|gate|quiescent so caller halts and resumes", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-17T23:07:09.977Z", "updatedAt": "2026-06-17T23:08:14.324Z", "description": "Replace the fully-automated step()/run_scenario() loop with a step model that returns a StepResult on every call. StepResult carries an outcome enum: clean (activation completed, no gate), gate_pre_activation (component has never run — halt before executing), gate_first_output (component just ran for the first time — halt before committing activation_end), quiescent (nothing left to process), and halt (step budget exhausted or livelock). The caller — whether a test script, a Claude runner, or an interactive CLI — decides what to do next: advance, review, amend, branch. This replaces the while-not-quiescent loop in run_scenario; the loop becomes the caller's responsibility. StepResult should carry enough context for the caller to act: the component name, the activation id, the gate type, and the pending tool calls / emissions if applicable.", "blocks": ["dizzy-c015", "dizzy-4993"]}, {"id": "dizzy-48da", "title": "point/ simulate prototype: virtual/real executor & emitter spikes (pre-harness)", "status": "open", "type": "epic", "priority": 1, "createdAt": "2026-06-14T14:26:57.561Z", "updatedAt": "2026-06-14T17:34:01.978Z", "description": "Prototyping spikes in point/ that de-risk dizzy simulate (pl-f395, child dizzy-3c9e) before the real harness is built. Proves two orthogonal dials — executor (sim=LLM agent vs lib=real compiled handler) and emitter (sim=narrative string vs lib=schema-validated dizzy payload) — so one scenario can mix real and faked commands/events. Design docs: point/PLAN.md (phased loop + procedure/policy mirror rule), point/PROVIDER.md (agent-subprocess provider + ad-hoc MCP), point/EXECUTORS.md (the virtual/real matrix). Proven so far: try_mcp.py drives claude and pi through an ad-hoc FastMCP server, recording emissions harness-side (haiku default; clean-cwd cost trick).", "blockedBy": ["dizzy-60f5", "dizzy-6cad", "dizzy-4ed2", "dizzy-9d88", "dizzy-c4c4", "dizzy-9284", "dizzy-8e54"], "blocks": ["dizzy-3c9e"]}, {"id": "dizzy-3c9e", "title": "simulate core: wiring graph + phased event/command scheduler with scripted executors and step budget (no LLM)", "status": "open", "type": "task", "priority": 1, "plan_step_index": 0, "description": "<!-- seeds:plan-backref:start -->\nStep 1 of plan pl-f395.\n\nParent seed: dizzy-ae76 — dizzy simulate: LLM-driven feature-file execution\nPlan template: feature\nPlan approach: Build the deterministic skeleton first and keep LLMs at the edge. (1) A phased single-thread scheduler (drain event queue, then command queue, repeat) over the feat-file wiring graph, driven by pluggable component executors — scripted/stub…\n\nRun `sd plan show pl-f395` for the full plan (context, alternatives, sibling steps, acceptance criteria).\n<!-- seeds:plan-backref:end -->\n\n## Roleplay learnings (dizzy-0504 — sim/ manual dry-run, runs 1-3)\n\nScheduler-core rules validated by hand against sim/library.feat.yaml (sources: sim/PLAYBOOK.md ground rules; session sim/sessions/*.jsonl):\n- PHASED LOOP (rule 1): drain the event queue (policies + projections) then the command queue (procedures), repeat. One legal interleaving; make no concurrency claims.\n- TERMINATION (rule 5): default step budget 30. Repetition/livelock: same component activated on the same message shape 3x -> stop and record a possible-livelock finding. N configurable.\n- INJECTION (ruling, run 1): inject ONE scenario command at a time; run to quiescence before the next.\n- FIRST-EXECUTION REVIEW GATE (rule 11, born run 3 at t37): before activating a component whose execution count is 0 (a simple count gathered from the session log / event store), the scheduler PAUSES for human/Director review of its description. An unexecuted description may be partly/entirely wrong, and pre-first-execution is the one moment to fix it before breaking facts accumulate. Confirmed -> proceed; amended -> the feat revision applies from that node. The scheduler needs an execution-count hook and a pause/resume seam for this.\n- LEVEL-0 PROJECTION SKIP (rule 10, jmQ collapse): at level 0 projections never activate and are never logged; the scheduler drains only events that have policy/querier consequences. Projection activation returns at level 2 (see dizzy-01cc).", "createdAt": "2026-06-12T00:45:38.879Z", "updatedAt": "2026-06-14T14:27:49.844Z", "labels": ["roadmap", "simulate"], "plan_id": "pl-f395", "blocks": ["dizzy-c3ca", "dizzy-21c7", "dizzy-ae76"], "blockedBy": ["dizzy-48da"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-c3ca", "title": "simulate harness contract: per-activation tool synthesis from declared wiring (emit/dispatch/query + report_finding) and payload schema validation with rejection", "status": "open", "type": "task", "priority": 1, "plan_step_index": 1, "description": "<!-- seeds:plan-backref:start -->\nStep 2 of plan pl-f395.\n\nParent seed: dizzy-ae76 — dizzy simulate: LLM-driven feature-file execution\nPlan template: feature\nPlan approach: Build the deterministic skeleton first and keep LLMs at the edge. (1) A phased single-thread scheduler (drain event queue, then command queue, repeat) over the feat-file wiring graph, driven by pluggable component executors — scripted/stub…\n\nRun `sd plan show pl-f395` for the full plan (context, alternatives, sibling steps, acceptance criteria).\n<!-- seeds:plan-backref:end -->\n\n## Roleplay learnings (dizzy-0504 — sim/ manual dry-run, runs 1-3)\n\nHarness-contract rules validated by hand (sim/PLAYBOOK.md; sessions):\n- TOOLS FROM WIRING ONLY (rule 2): synthesize exactly emit_<event> per declared emit, dispatch_<command> per policy emit, query_<name> per declared query. No tool, no emission. Observed sets: lend_book -> [query_get_member_registration, query_get_book_availability, query_get_next_reservation, emit_book_borrowed, emit_borrow_rejected, report_finding]; policy fulfill_reservation_on_return -> [query_get_next_reservation, dispatch_hold_copy_for_member, dispatch_notify_member, report_finding].\n- report_finding ALWAYS present (rule 3).\n- POLICIES MAY DECLARE QUERIES (dizzy-c9c5, shipped): tool synthesis must emit query_<name> tools for POLICY activations, not just procedures. The t37 trap (a policy needing reservation data with no way to query) is what drove c9c5; the contract now covers policy queries.\n- NON-AUTONOMOUS-COMMAND-DISPATCH (finding u2, run 3): a policy may only dispatch commands the system can execute ITSELF. The original policy dispatched borrow_book, but borrowing is a physical human act — not dispatchable. Candidate semantic check at the contract/validation layer: flag policy emits whose command requires external/human action. Ties to dizzy-c5a0.\n- Payload validation: at level 0 narrative only (no schema); rejection/re-prompt behavior begins at level >= 1.", "createdAt": "2026-06-12T00:45:38.879Z", "updatedAt": "2026-06-13T16:21:44.758Z", "labels": ["roadmap", "simulate"], "plan_id": "pl-f395", "blockedBy": ["dizzy-3c9e"], "blocks": ["dizzy-f87c", "dizzy-448c", "dizzy-ae76"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-21c7", "title": "simulate findings pipeline: report_finding capture, repetition/livelock detector, findings report as the run product (JSON + pretty)", "status": "open", "type": "task", "priority": 1, "plan_step_index": 2, "description": "<!-- seeds:plan-backref:start -->\nStep 3 of plan pl-f395.\n\nParent seed: dizzy-ae76 — dizzy simulate: LLM-driven feature-file execution\nPlan template: feature\nPlan approach: Build the deterministic skeleton first and keep LLMs at the edge. (1) A phased single-thread scheduler (drain event queue, then command queue, repeat) over the feat-file wiring graph, driven by pluggable component executors — scripted/stub…\n\nRun `sd plan show pl-f395` for the full plan (context, alternatives, sibling steps, acceptance criteria).\n<!-- seeds:plan-backref:end -->\n\n## Roleplay learnings (dizzy-0504 — sim/ manual dry-run, runs 1-3)\n\nFindings-pipeline rules validated by hand (sim/PLAYBOOK.md; sessions):\n- PAUSE ON report_finding (rule 6): every finding checkpoints to the human/Director before the activation proceeds — never build on a wrong assumption.\n- NO SPECULATIVE EMITS (rule 7): an activation that cannot logically deduce an outcome ends WITHOUT emitting. Emitting alongside a finding is allowed only for branches that ARE deducible.\n- A FINDING ENDS AN ACTIVATION, NOT THE RUN (rule 8): the run continues to quiescence/budget collecting the full findings list (the product). Fixes happen at RUN END, then a branch from the pre-fix node verifies them under the amended feature-file.\n- RECORD, DON'T SUGGEST (rule 9): every finding gets a resolution carrying the Director's decision AND the argument_as_stated VERBATIM (load-bearing: it encodes assumptions the design team cannot infer and may later prove wrong). The engine never editorializes, infers motives, or fills in punchlines.\n- RESOLUTION CATEGORIES observed: design-change (feature-file wrong -> amend, branch, verify); insufficient-context (design fine, world under-specified -> amend scenario context, close branch, fork fresh); unreviewed-component (never executed, no evidence of correctness -> backtrack to pre-activation, rewrite description, re-attempt under rule 11).\n- FINDING KINDS observed: missing-slot, ambiguous-description, undecidable-branch, unanswerable-query, missing-query-wiring (now resolved by dizzy-c9c5), non-autonomous-command-dispatch (u2), possible-livelock (rule 5).\n- LIVELOCK DETECTOR (rule 5): same component + same message shape, N=3 -> possible-livelock finding rather than hard abort.", "createdAt": "2026-06-12T00:45:38.879Z", "updatedAt": "2026-06-13T16:21:44.829Z", "labels": ["roadmap", "simulate"], "plan_id": "pl-f395", "blockedBy": ["dizzy-3c9e"], "blocks": ["dizzy-f87c", "dizzy-ae76"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-f87c", "title": "simulate --manual mode: prompt rendering from component descriptions, JSON tool-call protocol on stdin; first end-to-end level-0 run on guestbook", "status": "open", "type": "task", "priority": 1, "plan_step_index": 3, "description": "<!-- seeds:plan-backref:start -->\nStep 4 of plan pl-f395.\n\nParent seed: dizzy-ae76 — dizzy simulate: LLM-driven feature-file execution\nPlan template: feature\nPlan approach: Build the deterministic skeleton first and keep LLMs at the edge. (1) A phased single-thread scheduler (drain event queue, then command queue, repeat) over the feat-file wiring graph, driven by pluggable component executors — scripted/stub…\n\nRun `sd plan show pl-f395` for the full plan (context, alternatives, sibling steps, acceptance criteria).\n<!-- seeds:plan-backref:end -->\n\n## Roleplay learnings (dizzy-0504 — sim/ manual dry-run, runs 1-3)\n\nThe --manual turn contract, exercised by hand (sim/PLAYBOOK.md 'Turn protocol'):\nEach activation is one exchange:\n  HARNESS -> component:\n    component: <name> (<kind>)\n    description: <verbatim from feat-file>\n    trigger: <message type + payload narrative>\n    tools: [<synthesized tool names> + report_finding]\n  COMPONENT -> harness (JSON, one or more calls):\n    {\"tool\": \"query_...\", \"args\": {...narrative...}}\n    {\"tool\": \"emit_...\"/\"dispatch_...\", \"args\": {...narrative...}}\nThe harness validates every call (declared tool? plausible shape?), appends to the session log, and schedules consequences.\n- QUERY ANSWERING (Q1 + rule 10, jmQ collapse): a query is answered by a synchronous SUB-ACTIVATION — a querier given the query's description and full read access to the simulated event store, answering from the stream (a dj-style regression). If the stream cannot answer -> report_finding. Queriers do not fabricate.\n- LEVEL 0 = narrative payloads (prose), no schemas. First end-to-end target is guestbook; the library feat was the by-hand reference.\n- The same message protocol is reused unchanged by --exec (dizzy-7259) and --provider (dizzy-1196).", "createdAt": "2026-06-12T00:45:38.879Z", "updatedAt": "2026-06-13T16:21:44.924Z", "labels": ["roadmap", "simulate"], "plan_id": "pl-f395", "blockedBy": ["dizzy-c3ca", "dizzy-21c7"], "blocks": ["dizzy-e2d4", "dizzy-448c", "dizzy-7259", "dizzy-1196", "dizzy-ae76"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-e2d4", "title": "simulate session file: versioned append-only JSONL run log (itself a DIZZY event stream) + deterministic replay", "status": "open", "type": "task", "priority": 1, "plan_step_index": 4, "description": "Plan pl-f395 step 5. Requirements: docs/cli.md § dizzy simulate (session file paragraph). Versioned append-only JSONL whose entries carry id/parentId so the file is a tree (prior art: pi agent session format — branching is in-place appending to an earlier parent, context rebuild walks leaf->root). Entry-type vocabulary seeded by the sim/ roleplay (PLAYBOOK.md Q5). Scheduler should emit the structured trace from day one; this step persists + versions + replays it.\n\n## Roleplay learnings (dizzy-0504 — sim/ manual dry-run, runs 1-3)\n\nEntry-type vocabulary converged across runs 1-3 (see sim/sessions/contested_reservation__3.jsonl for live examples u1-u18):\n- header — feat-file + scenario + level + query mode + step budget + format version.\n- ruling — a Director decision on a protocol ambiguity (harness stops and asks rather than assuming; every ruling logged). Carries decision + argument_as_stated.\n- injection — a scenario command entering the command queue (one at a time; run to quiescence before the next).\n- activation / tool_call / query_answer / emission / finding / halt — the per-step trace.\n- activation_end — closes an activation: emissions produced (possibly none) + outcome (needed the moment an activation ends without emitting).\n- resolution — resolves a finding: resolves:<finding-id>, decision, argument_as_stated VERBATIM (rule 9). Categories: design-change, insufficient-context, unreviewed-component.\n- branch — opens a counterfactual: parentId points at the fork node; records why and which feature-file/scenario revision applies from here.\n- context — scenario givens materialized at branch start (technician-style setup the story assumes); enter the event store as pre-existing facts that queriers may cite.\n- amendment (added run 3, entry u18) — run-end feat amendments applied to the artifact: applies:[ruling/resolution ids], target file, detail.\nTREE SHAPE: every line {id, parentId, type, ...}. Branching = appending new entries pointing at an earlier parentId in the SAME file; context rebuild walks leaf->root. Version the format from the first commit — it becomes a de-facto public contract the moment branching exists (replay to step N, swap feature-file, resume).", "createdAt": "2026-06-12T00:45:38.879Z", "updatedAt": "2026-06-13T16:21:44.983Z", "labels": ["roadmap", "simulate"], "plan_id": "pl-f395", "blockedBy": ["dizzy-f87c"], "blocks": ["dizzy-6173", "dizzy-01cc", "dizzy-ae76"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-ae76", "title": "dizzy simulate: LLM-driven feature-file execution", "status": "open", "type": "feature", "priority": 1, "createdAt": "2026-06-12T00:08:29.373Z", "updatedAt": "2026-06-18T00:13:02.730Z", "description": "Requirements: docs/cli.md § dizzy simulate. Phased event/command queue scheduler; narrow per-activation LLM calls with wiring-derived tools only; schema-validated payloads; report_finding tool (findings are the product); step budget + livelock detector; --level 0/1/2; append-only branchable session file; --provider/--exec/--manual modes.", "labels": ["roadmap"], "blocks": ["dizzy-7ec4", "dizzy-fab8"], "plan_id": "pl-f395", "blockedBy": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-4d51", "title": "dizzy impact: change impact subgraph with verdicts", "status": "open", "type": "feature", "priority": 1, "createdAt": "2026-06-12T00:08:29.302Z", "updatedAt": "2026-06-12T00:08:52.501Z", "description": "Requirements: docs/cli.md § dizzy impact. Four tiers: slot lineage, compiler oracle (worktree+typecheck), event-store compat, LLM semantic review. Verdicts must-change/must-review/unaffected-proven + recoverability bit. --emit seeds writes worklist in topo order (emitter behind small interface). Graph rendering is external repo; product here is the machine-readable verdict set.", "labels": ["roadmap"], "blockedBy": ["dizzy-cad7", "dizzy-a637"]}, {"id": "dizzy-a637", "title": "Spec gap: field-level projection slot mappings in feature-file/LinkML", "status": "open", "type": "task", "priority": 1, "createdAt": "2026-06-12T00:08:29.235Z", "updatedAt": "2026-06-12T00:08:52.501Z", "description": "Requirements: docs/cli.md § dizzy impact, tier 1. Feature-file/LinkML must declare projection mappings at field granularity (which event slots map to which model columns) so slot-lineage walks are sound. Versioned feat-file format change — treat as compatibility-guaranteed spec.", "labels": ["roadmap"], "blocks": ["dizzy-4d51"]}, {"id": "dizzy-cad7", "title": "dizzy diff: structural feature-file diff", "status": "open", "type": "feature", "priority": 1, "createdAt": "2026-06-12T00:08:29.172Z", "updatedAt": "2026-06-12T00:08:52.578Z", "description": "Requirements: docs/cli.md § dizzy diff. Components/edges/slots added/removed/renamed/retyped; machine-readable change set classified additive / contract-changing / breaking / lossy-to-truth. Foundation for impact.", "labels": ["roadmap"], "blocks": ["dizzy-4d51", "dizzy-9e5e"]}, {"id": "dizzy-d4b7", "title": "Context Environment & Telemetry: inject constants and observation sinks into DIZZY function contexts", "status": "open", "type": "epic", "priority": 2, "createdAt": "2026-06-23T16:45:31.674Z", "updatedAt": "2026-06-23T16:45:53.873Z", "blocks": ["dizzy-a701", "dizzy-9745", "dizzy-aa1d", "dizzy-0983", "dizzy-262a", "dizzy-2686", "dizzy-7e4e"]}, {"id": "dizzy-bf28", "title": "Align onboard/prime verbs with Seeds: rename dizzy onboard→prime, add onboard installer", "status": "open", "type": "task", "priority": 2, "createdAt": "2026-06-18T14:00:27.325Z", "updatedAt": "2026-06-18T14:00:42.157Z", "description": "## Problem\n`dizzy onboard` is misnamed. Comparing the three verbs:\n\n| Verb | Behavior | Mutates files? | Cadence |\n|------|----------|----------------|---------|\n| `sd onboard` | Writes/updates a Seeds section into CLAUDE.md/AGENTS.md (`--check`, `--stdout`) | YES — installer | Once per repo |\n| `sd prime` | Prints agent context (rules, command ref, workflow) to stdout | No | Every session / after compaction |\n| `dizzy onboard` | Prints an agent overview to stdout (components, feature-file role, change taxonomy, exemplars) | No | Read-first per session |\n\n`dizzy onboard` is read-only and per-session — its own doc (docs/onboard.md, docs/cli.md:94-101) even says \"Modeled on the seeds tool's `prime` verb.\" So it semantically IS `dizzy prime` wearing the wrong name. DIZZY currently has NO equivalent of `sd onboard` (the installer that injects a section into CLAUDE.md).\n\n## Recommendation — adopt the Seeds two-verb split\n1. Rename `dizzy onboard` → `dizzy prime` — the per-session context printer (it already is this).\n2. Reclaim `dizzy onboard` for the installer role it's missing: write a DIZZY section into CLAUDE.md/AGENTS.md (with `--check`/`--stdout`), like `sd onboard`.\n\nResult: same mental model agents already learn from Seeds — `onboard` = install once, `prime` = load each session.\n\n## Implementation notes / order (per CLAUDE.md conventions)\n- `onboard` is a SHIPPED command (docs/cli.md:25). Change scope in docs/cli.md FIRST, then seeds, then code.\n- Rename canonical doc dizzy/src/dizzy/docs/onboard.md → prime.md and update the `_print_doc(\"onboard.md\")` call (cli.py:398-401).\n- Keep a deprecation alias `onboard` → `prime` for a release for anything referencing the old name.\n- New `dizzy onboard` installer: write DIZZY section to CLAUDE.md/AGENTS.md, support `--check` and `--stdout`.\n\n## Minimal fallback\nIf renaming a shipped verb is too much churn now: just ADD `dizzy onboard` (installer) alongside the existing printer, and rename the printer to `prime` later. Downside: leaves the confusing semantics in place."}, {"id": "dizzy-d04b", "title": "Audit the example against the hard-case test: demonstrate the loop absorbing a breaking change", "status": "open", "type": "task", "priority": 2, "createdAt": "2026-06-18T00:12:37.033Z", "updatedAt": "2026-06-18T00:13:02.801Z", "description": "v1. A happy-path example proves nothing a CRUD tutorial doesn't. The example earns v1 only if it exhibits at least one breaking change on purpose (e.g. BookLoaned -> CopyLoaned in the library example) so the walkthrough shows the loop *absorbing* change, not just running. If only happy path, add the one change — a narrative addition, not a rewrite.", "labels": ["roadmap"], "blockedBy": ["dizzy-29aa"], "blocks": ["dizzy-fab8"]}, {"id": "dizzy-6cad", "title": "Matrix wiring: mixed scenario (real + faked commands/events) routed through both executors and emitters", "status": "open", "type": "task", "priority": 2, "createdAt": "2026-06-14T14:27:31.376Z", "updatedAt": "2026-06-14T14:27:49.782Z", "description": "Feed both executors through both emitters; route per message type (real schema -> lib_emitter, else sim_emitter) and per component (real handler -> lib_executor, else sim_executor). Run a scenario that mixes schema-real and string-faked commands/events end-to-end and route expectations accordingly (structural assert for real, narrative for faked). The deliverable that justifies the two-axis design. point/EXECUTORS.md step 4.", "blocks": ["dizzy-48da"], "blockedBy": ["dizzy-60f5"]}, {"id": "dizzy-60f5", "title": "sim_emitter + lib_emitter: payload factory abstraction (narrative string vs schema-validated dizzy payload)", "status": "open", "type": "task", "priority": 2, "createdAt": "2026-06-14T14:27:31.319Z", "updatedAt": "2026-06-14T14:40:37.315Z", "description": "Factor command_factory/event_factory out of both executors into an emitter interface. sim_emitter = string wrap (level 0); lib_emitter = construct + validate against the dizzy-generated LinkML/Pydantic schema for the named type (level >=1). Per-type registry picks the emitter. point/EXECUTORS.md step 3.", "blocks": ["dizzy-48da", "dizzy-6cad"]}, {"id": "dizzy-c5a0", "title": "Knowledge: stricter command/event semantic enforcement — commands must be impossible to construct without their required referents", "status": "open", "type": "task", "priority": 2, "createdAt": "2026-06-12T03:41:06.434Z", "updatedAt": "2026-06-12T03:41:06.434Z", "description": "Origin: sim run 1 (borrow_available_book__1.jsonl, findings s7+s26). borrow_book was injectable with no member identity; lend_book's deduction was sound but the command was never legitimate — the root cause sits at command construction, not at the handler. Directions to build on when this recurs: (1) level-1 slot schemas make required ids structural; (2) referential validity against the event ves, sibling steps, acceptance criteria).\n<!-- seeds:plan-backref:end -->\n\n## Roleplay learnings (dizzy-0504 — sim/ manual dry-run, runs 1-3)\n\nLevel-2 semantics, resolved by the roleplay (answers PLAYBOOK Q2 follow-up):\n- LEVEL 2 = materialize models as CACHES OF THE STREAM. At level 0 the j->m->Q chain COLLAPSES (rule 10): projections never activate, only events are recorded, and a query is answered by a querier scanning the event store. Level 2 UN-collapses this: one JSON blob per Model lives in the session file; projections activate and propose mutations to that state THROUGH the harness; queriers answer ONLY from the supplied model state — never by scanning the raw stream.\n- WHY IT MATTERS: level 2 mechanically verifies projection wiring instead of trusting a clever querier. Concrete case from run 3 (branch u): dequeue-on-hold + held-not-available. At level 0 the querier INFERRED Grace's dequeue from copy_held_for_member in the stream; at level 2 it only holds if the projections dequeue_reservation_on_hold and mark_copy_held_in_catalog actually mutate the reservations/catalog model state. Same for the unverified lend_book held-copy pickup path (get_hold_for_member answered from materialized state).\n- PREREQUISITE: authored def/ schemas (the level-1 gate, dizzy-448c) so model-state shapes exist.", "createdAt": "2026-06-12T00:45:38.879Z", "updatedAt": "2026-06-13T16:21:45.048Z", "labels": ["roadmap", "simulate"], "plan_id": "pl-f395", "blockedBy": ["dizzy-e2d4", "dizzy-448c"], "blocks": ["dizzy-7e6d", "dizzy-ae76"], "plan_status": "approved", "plan_children": ["dizzy-3c9e", "dizzy-c3ca", "dizzy-21c7", "dizzy-f87c", "dizzy-e2d4", "dizzy-6173", "dizzy-448c", "dizzy-01cc", "dizzy-7259", "dizzy-1196", "dizzy-7e6d"]}, {"id": "dizzy-7259", "title": "simulate --exec mode: subprocess protocol (prompt on stdin, JSON tool-call on stdout) for non-interactive agent CLIs", "status": "open", "type": "task", "priority": 2, "plan_step_index": 8, "description": "<!-- seeds const PRIO = {
  0: {label:"P0",  c:"#e5484d"}, 1: {label:"High", c:"#e5484d"},
  2: {label:"Med", c:"#f0a830"}, 3: {label:"Low",  c:"#4a8cf0"},
  4: {label:"Backlog", c:"#5a6675"},
};
const prioOf = s => PRIO[s.priority] || PRIO[4];

const COLW = 230, ROWH = 64, PADX = 30, PADY = 30, NW = 190, NH = 46;

function build(hideClosed) {
  const seeds = SEEDS.filter(s => !(hideClosed && s.status === "closed"));
  const ids = new Set(seeds.map(s => s.id));
  const byId = Object.fromEntries(seeds.map(s => [s.id, s]));
  const openSet = new Set(seeds.filter(s => s.status !== "closed").map(s => s.id));

  // edges: blocker -> blocked. Merge blockedBy + inverse of blocks.
  const edges = new Set();
  for (const s of seeds) {
    for (const b of (s.blockedBy || [])) if (ids.has(b)) edges.add(b + "|" + s.id);
    for (const b of (s.blocks || []))   if (ids.has(b)) edges.add(s.id + "|" + b);
  }
  const E = [...edges].map(e => e.split("|"));
  const preds = {}, succs = {};
  for (const id of ids) { preds[id] = []; succs[id] = []; }
  for (const [a, b] of E) { succs[a].push(b); preds[b].push(a); }

  // longest-path layering (cycle-guarded)
  const layer = {};
  const visiting = new Set();
  function L(id) {
    if (id in layer) return layer[id];
    if (visiting.has(id)) return 0;        // break cycle
    visiting.add(id);
    let m = 0;
    for (const p of preds[id]) m = Math.max(m, L(p) + 1);
    visiting.delete(id);
    return layer[id] = m;
  }
  for (const id of ids) L(id);

  // group by layer, order within layer by priority then id
  const cols = {};
  for (const id of ids) (cols[layer[id]] ||= []).push(id);
  for (const k in cols) cols[k].sort((x, y) =>
    (byId[x].priority - byId[y].priority) || x.localeCompare(y));

  const pos = {};
  let maxRows = 0;
  for (const k of Object.keys(cols).map(Number).sort((a, b) => a - b)) {
    cols[k].forEach((id, i) => pos[id] = { x: PADX + k * COLW, y: PADY + i * ROWH });
    maxRows = Math.max(maxRows, cols[k].length);
  }
  const ncols = Object.keys(cols).length;
  return { seeds, byId, openSet, E, preds, succs, pos,
           W: PADX * 2 + ncols * COLW, H: PADY * 2 + maxRows * ROWH };
}

function ancestors(id, preds) {
  const out = new Set(), stack = [id];
  while (stack.length) { const n = stack.pop();
    for (const p of preds[n]) if (!out.has(p)) { out.add(p); stack.push(p); } }
  return out;
}
function descendants(id, succs) {
  const out = new Set(), stack = [id];
  while (stack.length) { const n = stack.pop();
    for (const s of succs[n]) if (!out.has(s)) { out.add(s); stack.push(s); } }
  return out;
}

let selected = null;

function render() {
  const hideClosed = document.getElementById("hideClosed").checked;
  const g = build(hideClosed);
  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("width", g.W); svg.setAttribute("height", g.H);

  const edgeEls = {};
  for (const [a, b] of g.E) {
    const pa = g.pos[a], pb = g.pos[b];
    const x1 = pa.x + NW, y1 = pa.y + NH / 2, x2 = pb.x, y2 = pb.y + NH / 2;
    const mx = (x1 + x2) / 2;
    const path = document.createElementNS(NS, "path");
    path.setAttribute("d", `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    path.setAttribute("class", "edge");
    svg.appendChild(path);
    (edgeEls[a] ||= []).push(path); (edgeEls[b] ||= []).push(path);
  }

  const nodeEls = {};
  for (const s of g.seeds) {
    const p = g.pos[s.id], pr = prioOf(s);
    const blocked = (s.blockedBy || []).some(b => g.openSet.has(b)) && s.status !== "closed";
    const grp = document.createElementNS(NS, "g");
    grp.setAttribute("class", "node" + (blocked ? " blocked" : ""));
    grp.setAttribute("transform", `translate(${p.x},${p.y})`);
    const rect = document.createElementNS(NS, "rect");
    rect.setAttribute("width", NW); rect.setAttribute("height", NH);
    rect.setAttribute("fill", s.status === "closed" ? "#1b2129" : "#1f2630");
    rect.setAttribute("stroke", pr.c);
    grp.appendChild(rect);
    const id = document.createElementNS(NS, "text");
    id.setAttribute("class", "id"); id.setAttribute("x", 9); id.setAttribute("y", 17);
    id.textContent = s.id + (s.status === "closed" ? " ✓" : "");
    grp.appendChild(id);
    const t = document.createElementNS(NS, "text");
    t.setAttribute("class", "title"); t.setAttribute("x", 9); t.setAttribute("y", 33);
    t.textContent = s.title.length > 30 ? s.title.slice(0, 29) + "…" : s.title;
    grp.appendChild(t);

    grp.addEventListener("mouseenter", () => highlight(s.id, g, nodeEls));
    grp.addEventListener("mouseleave", () => clearHi(g, nodeEls, edgeEls));
    grp.addEventListener("click", () => { selected = s.id; showSide(s, g); });
    nodeEls[s.id] = grp;
    svg.appendChild(grp);
  }

  const graph = document.getElementById("graph");
  [...graph.querySelectorAll("svg")].forEach(e => e.remove());
  graph.appendChild(svg);
  drawLegend();
  if (selected && g.byId[selected]) showSide(g.byId[selected], g);
}

function highlight(id, g, nodeEls) {
  const chain = new Set([id, ...ancestors(id, g.preds), ...descendants(id, g.succs)]);
  for (const [nid, el] of Object.entries(nodeEls))
    el.classList.toggle("dim", !chain.has(nid));
  // light any edge whose both endpoints are in the focused node's chain
  const paths = document.querySelectorAll("#graph svg .edge");
  g.E.forEach(([a, b], k) => {
    if (paths[k]) paths[k].classList.toggle("hot", chain.has(a) && chain.has(b));
  });
}

function clearHi(g, nodeEls) {
  for (const el of Object.values(nodeEls)) el.classList.remove("dim");
  document.querySelectorAll(".edge").forEach(e => e.classList.remove("hot"));
}

function showSide(s, g) {
  const pr = prioOf(s);
  for (const el of document.querySelectorAll(".node")) el.classList.remove("sel");
  const side = document.getElementById("side");
  const names = ids => (ids || []).filter(i => g.byId[i])
    .map(i => `<code>${i}</code> ${g.byId[i].title}`).join("<br>") || "<span class=muted>none</span>";
  side.innerHTML = `
    <h2>${s.id}</h2>
    <div class="meta">${s.title}</div>
    <div class="meta">${pr.label} · ${s.type || "?"} · ${s.status}
      ${(s.labels || []).map(l => `<code>${l}</code>`).join(" ")}
      ${s.plan_id ? ` · plan <code>${s.plan_id}</code>` : ""}</div>
    <div class="desc">${(s.description || "").replace(/</g, "&lt;")}</div>
    <div class="deps"><b>Blocked by:</b><br>${names(s.blockedBy)}</div>
    <div class="deps"><b>Blocks:</b><br>${names(s.blocks)}</div>`;
}

function drawLegend() {
  const seen = [1, 2, 3, 4];
  document.getElementById("legend").innerHTML =
    seen.map(p => `<div class="row"><span class="sw" style="background:${PRIO[p].c}"></span>${PRIO[p].label}</div>`).join("")
    + `<div class="row muted" style="margin-top:4px">▱ dashed = blocked</div>`;
}

document.getElementById("hideClosed").addEventListener("change", render);
render();
</script>
