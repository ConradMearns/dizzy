id: https://example.org/events
name: events
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  guestbook_signed:
    description: A visitor signed the guestbook
    attributes:
      signature_id:
        range: string
        required: true
      visitor_name:
        range: string
        required: true
      message:
        range: string
        required: true
      signed_at:
        range: datetime
        required: true
