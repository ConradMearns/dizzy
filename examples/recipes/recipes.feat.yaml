description: >-
  Recipe kitchen — a chained, event-sourced cooking workflow. Recipes are
  templates whose steps are structured data (never free text); batches are
  durable running instances of a recipe. Each recipe's output entity feeds the
  next recipe in the chain:

      active_starter ─▶ sourdough_loaf ─▶ garlic_croutons

  The star of this example is a POLICY-driven cascade over W3C PROV-style events.
  Batches can be queued in a *blocked* state when the entity they require does not
  exist yet. When a batch produces its output (entity_produced), the policy
  advance_ready_batches consults the queue of blocked batches and dispatches the
  command to advance whichever one was waiting for that entity — so finishing the
  starter cascades through the loaf and into the croutons from a single trigger.

# ─────────────────────────────────────────────────────────────────────────────
# PROV-O mapping (W3C PROV). Events here record RELATIONSHIPS, not free prose:
#   step_performed   ≙ prov:Activity / prov:wasAssociatedWith (a step ran, with a tool)
#   entity_consumed  ≙ prov:used                 (an activity used an entity)
#   entity_produced  ≙ prov:wasGeneratedBy        (an entity was generated by an activity)
#   entity_derived   ≙ prov:wasDerivedFrom        (an entity was derived from another)
# Entities are ingredient lots / intermediate & finished products; Activities are
# step executions; Agents are tools. See README.md for the full mapping.
# ─────────────────────────────────────────────────────────────────────────────

# Write intents
commands:
  # Catalog authoring — ingredients, tools, recipes, and the typed steps of each recipe.
  register_ingredient: Add an ingredient type to the pantry catalog
  register_tool: Add a tool (a PROV agent) to the catalog
  define_recipe: Declare a recipe header — what it yields and what upstream entity it requires
  add_recipe_step: Add one ordered, structured step to a recipe
  add_step_input: Declare one typed input a recipe step consumes

  # Execution.
  start_batch: Open a batch — a durable running instance of a recipe
  # advance_batch is dispatched by an end user for the root batch and by the
  # advance_ready_batches policy for every downstream batch in the chain.
  advance_batch: Run a batch's steps to completion, producing its output entity

# Immutable facts
events:
  # Catalog facts.
  ingredient_registered: An ingredient type was added to the pantry
  tool_registered: A tool was added to the catalog
  recipe_defined: A recipe header was declared
  recipe_step_added: A structured step was added to a recipe
  step_input_added: A typed input was declared for a recipe step

  # A batch was opened; status records whether its required entity exists yet.
  batch_opened: A batch was opened, either ready to run or blocked on a missing entity

  # PROV relationship facts (see mapping above). Each carries identity + a timestamp.
  step_performed: A recipe step was executed by a tool         # prov:wasAssociatedWith
  entity_consumed: A step consumed an entity                   # prov:used
  entity_produced: A batch produced an output entity           # prov:wasGeneratedBy
  entity_derived: An output entity was derived from a source   # prov:wasDerivedFrom
  batch_completed: A batch finished running all of its steps

# Command handlers (command → procedure → event)
procedures:
  record_ingredient:
    description: Validate and record a new pantry ingredient type.
    command: register_ingredient
    emits: [ingredient_registered]

  record_tool:
    description: Validate and record a new tool.
    command: register_tool
    emits: [tool_registered]

  record_recipe:
    description: >-
      Record a recipe header. requires_type names the upstream entity this recipe
      consumes (empty for a root recipe like the starter); output_type names the
      entity it yields.
    command: define_recipe
    emits: [recipe_defined]

  record_step:
    description: Record one ordered step of a recipe as structured data.
    command: add_recipe_step
    emits: [recipe_step_added]

  record_step_input:
    description: Record one typed input consumed by a recipe step.
    command: add_step_input
    emits: [step_input_added]

  open_batch:
    description: >-
      Open a batch for a recipe. Look up the recipe's requires_type; if it is empty
      the batch is immediately ready. Otherwise ask check_inventory whether an
      entity of that type is available: if so the batch is ready, if not it is
      blocked. Emit batch_opened with the resolved status and requires_type so the
      cascade policy can find it later.
    command: start_batch
    queries: [get_recipe, check_inventory]
    emits: [batch_opened]

  run_batch:
    description: >-
      Run a batch to completion, emitting PROV relationship facts as it goes.

      Resolve the batch's recipe via get_batch, then load the recipe header
      (get_recipe), its steps (get_recipe_steps) and step inputs (get_step_inputs).

      For each step emit step_performed (the activity, with its tool). For each
      step input emit entity_consumed (prov:used). If the recipe has a
      requires_type, resolve the available upstream entity via check_inventory,
      emit entity_consumed for it, and after producing the output emit
      entity_derived to link output ⟶ source (prov:wasDerivedFrom).

      Finally emit one entity_produced (prov:wasGeneratedBy) for the recipe's
      output_type — the signal the cascade policy listens for — then batch_completed.
    command: advance_batch
    queries: [get_batch, get_recipe, get_recipe_steps, get_step_inputs, check_inventory]
    emits: [step_performed, entity_consumed, entity_produced, entity_derived, batch_completed]

# Read-optimized schemas (classes authored under def/models/)
models:
  catalog:
    description: Ingredients, tools, recipes, and the typed steps & inputs of each recipe
    adapters: [sqla]
  batches:
    description: Batches — durable running instances of recipes, with status
    adapters: [sqla]
  inventory:
    description: Entity lots that have been produced and whether they are still available
    adapters: [sqla]
  provenance:
    description: The queryable PROV graph — generations and derivations of entities
    adapters: [sqla]

# Build read state: fold each fact into a model
projections:
  # Catalog folds.
  ingredient_catalog:
    description: Persist each registered ingredient into the catalog
    event: ingredient_registered
    model: catalog
    adapter: sqla
  tool_catalog:
    description: Persist each registered tool into the catalog
    event: tool_registered
    model: catalog
    adapter: sqla
  recipe_catalog:
    description: Persist each defined recipe header into the catalog
    event: recipe_defined
    model: catalog
    adapter: sqla
  step_catalog:
    description: Persist each recipe step into the catalog
    event: recipe_step_added
    model: catalog
    adapter: sqla
  step_input_catalog:
    description: Persist each step input into the catalog
    event: step_input_added
    model: catalog
    adapter: sqla

  # Batch state.
  batch_store:
    description: Insert each opened batch with its status and requires_type
    event: batch_opened
    model: batches
    adapter: sqla
  batch_finalizer:
    description: Mark a batch completed when it finishes running
    event: batch_completed
    model: batches
    adapter: sqla

  # Inventory state — what is available to consume.
  inventory_store:
    description: Record each produced entity lot as available inventory
    event: entity_produced
    model: inventory
    adapter: sqla
  inventory_consumer:
    description: Mark an inventory lot unavailable once it is consumed
    event: entity_consumed
    model: inventory
    adapter: sqla

  # Provenance graph — only what trace_provenance needs is projected; step_performed
  # and entity_consumed remain immutable PROV facts in the event stream.
  generation_graph:
    description: Record each entity's generation (which batch/type produced it)
    event: entity_produced
    model: provenance
    adapter: sqla
  derivation_graph:
    description: Record each output→source derivation edge
    event: entity_derived
    model: provenance
    adapter: sqla

# Read state back out (Input/Output authored under def/queries/)
queries:
  get_recipe:
    description: A recipe header — its requires_type, output_type, and output_unit
    model: catalog
    adapter: sqla
  get_recipe_steps:
    description: The ordered steps of a recipe, as parallel lists
    model: catalog
    adapter: sqla
  get_step_inputs:
    description: The typed inputs of a recipe's steps, as parallel lists
    model: catalog
    adapter: sqla
  get_batch:
    description: A batch's recipe_id, requires_type, and status
    model: batches
    adapter: sqla
  check_inventory:
    description: Whether an available entity of a given type exists, and its id
    model: inventory
    adapter: sqla
  find_blocked_batches:
    description: The ids of batches blocked waiting for a given entity type
    model: batches
    adapter: sqla
  trace_provenance:
    description: The derivation chain for an entity, rendered newest-source-first
    model: provenance
    adapter: sqla
  list_recipes:
    description: All recipe headers, for a dashboard
    model: catalog
    adapter: sqla
  list_batches:
    description: All batches with their status, for a dashboard
    model: batches
    adapter: sqla

# The reactivity-loop payoff: a policy that QUERIES to decide which commands to
# dispatch. Reacts to entity_produced, asks find_blocked_batches who was waiting on
# that entity type, and dispatches advance_batch for each — driving the cascade.
policies:
  advance_ready_batches:
    description: >-
      When an entity is produced, any batch that was blocked waiting for that
      entity type is now ready. Consult find_blocked_batches for the produced type
      and dispatch advance_batch for each waiting batch. A policy emits commands
      only — never events — so the host routes advance_batch back into run_batch,
      whose entity_produced re-triggers this policy. The cascade ends when no batch
      is waiting for the produced type.
    event: entity_produced
    queries: [find_blocked_batches]
    emits: [advance_batch]
