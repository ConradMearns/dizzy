[project]
name = "query-find_blocked_batches"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "gen_def",
    "gen_int",
]

[tool.uv.sources]
gen_def = { workspace = true }
gen_int = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
sources = ["src"]
include = ["src/find_blocked_batches.py"]
