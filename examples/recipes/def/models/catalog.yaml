id: https://example.org/models/catalog
name: catalog
description: Ingredients, tools, recipes, and the typed steps & inputs of each recipe
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  Ingredient:
    description: A pantry ingredient type
    attributes:
      ingredient_type: { range: string, required: true, identifier: true }
      name: { range: string, required: true }
      unit: { range: string, required: true }
  Tool:
    description: A tool used to perform recipe steps (a PROV agent)
    attributes:
      tool_id: { range: string, required: true, identifier: true }
      name: { range: string, required: true }
  Recipe:
    description: A recipe header
    attributes:
      recipe_id: { range: string, required: true, identifier: true }
      name: { range: string, required: true }
      requires_type: { range: string, required: false }
      output_type: { range: string, required: true }
      output_unit: { range: string, required: true }
  RecipeStep:
    description: One ordered, structured step of a recipe
    attributes:
      id:
        range: string
        required: true
        identifier: true
        description: Composite key, "<recipe_id>#<step_order>"
      recipe_id: { range: string, required: true }
      step_order: { range: integer, required: true }
      activity_kind: { range: string, required: true }
      tool_id: { range: string, required: false }
  StepInput:
    description: One typed input consumed by a recipe step
    attributes:
      id:
        range: string
        required: true
        identifier: true
        description: Composite key, "<recipe_id>#<step_order>#<ingredient_type>"
      recipe_id: { range: string, required: true }
      step_order: { range: integer, required: true }
      ingredient_type: { range: string, required: true }
      qty: { range: decimal, required: true }
      unit: { range: string, required: true }
