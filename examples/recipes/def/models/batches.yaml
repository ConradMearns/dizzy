id: https://example.org/models/batches
name: batches
description: Batches — durable running instances of recipes, with status
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  Batch:
    description: A durable running instance of a recipe
    attributes:
      id: { range: string, required: true, identifier: true }
      recipe_id: { range: string, required: true }
      requires_type: { range: string, required: false }
      status:
        range: string
        required: true
        description: ready | blocked | completed
      opened_at:
        range: datetime
        required: true
        description: When the batch was opened — the FIFO key for unblocking
