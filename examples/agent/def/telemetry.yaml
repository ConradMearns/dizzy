id: https://example.org/telemetry
name: telemetry
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  Usage:
    description: Token usage reported by the provider for the turn so far.
    attributes:
      prompt_tokens:
        range: integer
      completion_tokens:
        range: integer
      total_tokens:
        range: integer
  stream_chunk:
    description: |-
      Sink for live LLM token chunks. `run_agent_turn` calls it per chunk to
      forward streamed output to the SSE transport. A transport concern — never
      recorded as an event.
    attributes:
      text:
        description: The incremental text delta for this chunk.
        range: string
        required: true
      usage:
        description: Cumulative token usage, present once the provider reports it.
        range: Usage
