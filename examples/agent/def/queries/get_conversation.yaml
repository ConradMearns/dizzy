id: https://example.org/queries/get_conversation
name: get_conversation
description: |-
  List all messages for a session_id in chronological order, including
  role, content, timestamps, and assistant token/cost telemetry. Used by
  the UI to render history and by `run_agent_turn` for LLM context.
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  GetConversationInput:
    description: Input for get_conversation — scopes the read to one conversation.
    attributes:
      session_id:
        description: Shared conversation key to read.
        range: string
        required: true
  GetConversationOutput:
    description: Output for get_conversation — messages in order, as parallel lists.
    attributes:
      roles:
        range: string
        multivalued: true
        description: Author per message — "user" or "assistant".
      contents:
        range: string
        multivalued: true
        description: Message text per row.
      created_ats:
        range: datetime
        multivalued: true
        description: Timestamp per row; the chronological ordering key.
      total_tokens:
        range: integer
        multivalued: true
        description: Token usage per row; empty/zero for user rows.
