id: https://example.org/models/conversations
name: conversations
description: |-
  Append-only log of messages (user + assistant) per conversation, with
  per-reply token/cost telemetry. Rebuilt from events by the projection.

  Every row relies on a shared session_id — the conversation key. A
  conversation is exactly the set of rows sharing one session_id, ordered
  by created_at.
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  Message:
    description: One message row in a conversation, keyed by session_id.
    attributes:
      id:
        description: Surrogate row id (unique per message).
        range: string
        required: true
        identifier: true
      session_id:
        description: Shared conversation key this row belongs to.
        range: string
        required: true
      role:
        description: Author of the message — "user" or "assistant".
        range: string
        required: true
      content:
        description: The message text.
        range: string
        required: true
      created_at:
        description: Ordering key within a conversation.
        range: datetime
        required: true
      prompt_tokens:
        range: integer
        required: false
      completion_tokens:
        range: integer
        required: false
      total_tokens:
        range: integer
        required: false
      cost_usd:
        range: float
        required: false
