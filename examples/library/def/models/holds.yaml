id: https://example.org/models/holds
name: holds
description: The hold queue — who is waiting for which book, in order
prefixes:
  linkml: https://w3id.org/linkml/
default_range: string
imports:
  - linkml:types
classes:
  Hold:
    description: A single active hold in the queue
    attributes:
      id:
        range: string
        required: true
        identifier: true
      book_id:
        range: string
        required: true
      patron:
        range: string
        required: true
      placed_at:
        range: datetime
        required: true
